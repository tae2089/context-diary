name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ctxdiary
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (with Postgres integration)
        env:
          TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/ctxdiary
        run: go test -race ./...
      - name: lint commit trailers (PR branch)
        if: github.event_name == 'pull_request'
        run: go run ./cmd/context-diary lint ${{ github.event.pull_request.base.sha }}..HEAD
